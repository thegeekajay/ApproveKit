<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ApproveKit Asset Preview</title>
  <link rel="stylesheet" href="css/approvekit.css">
  <style>
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; color: var(--ak-fg); background: var(--ak-bg); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:24px; }
    .sample { padding:24px; border:1px solid var(--ak-border); border-radius:16px; background:var(--ak-card); }
    .dark-card { background:#0B1020; color:#F1F5F9; }
    code { color: var(--ak-blue); }
  </style>
</head>
<body>
  <h1>ApproveKit assets</h1>
  <div class="grid">
    <div class="sample"><h2>Light logo</h2><img class="ak-logo ak-logo--xl" src="assets/logo/approvekit-logo-light.png" alt="ApproveKit"></div>
    <div class="sample dark-card"><h2>Dark logo</h2><img class="ak-logo ak-logo--xl" src="assets/logo/approvekit-logo-dark.png" alt="ApproveKit"></div>
    <div class="sample"><h2>Icon</h2><img class="ak-icon ak-icon--lg" src="assets/icon/approvekit-icon.png" alt="ApproveKit icon"></div>
    <div class="sample"><h2>Favicon</h2><img src="assets/favicon/favicon-32x32.png" alt="ApproveKit favicon"> <code>favicon-32x32.png</code></div>
  </div>
</body>
</html>
